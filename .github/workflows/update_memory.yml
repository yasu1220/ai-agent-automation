name: メモリー更新

on:
  schedule:
    # 毎朝5時（日本時間）= UTC 20時
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  update-memory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: メモリー更新
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DAILY_DB_ID: ${{ secrets.NOTION_DAILY_DB_ID }}
          NOTION_WEEKLY_PLAN_DB_ID: ${{ secrets.NOTION_WEEKLY_PLAN_DB_ID }}
          NOTION_MEMORY_PAGE_ID: ${{ secrets.NOTION_MEMORY_PAGE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_memory.py
